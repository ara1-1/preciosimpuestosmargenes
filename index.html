<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <title>Práctica de Precios, Impuestos y Márgenes en Excel</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <style>
    :root {
      --primary: #2563eb;
      --primary-dark: #1d4ed8;
      --bg: #f4f4f5;
      --card-bg: #ffffff;
      --text-main: #111827;
      --text-muted: #6b7280;
      --accent: #16a34a;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    body {
      background: var(--bg);
      color: var(--text-main);
      padding: 1rem;
    }

    .container {
      max-width: 800px;
      margin: 0 auto;
    }

    header {
      text-align: center;
      margin-bottom: 1.5rem;
    }

    header h1 {
      font-size: 1.6rem;
      margin-bottom: 0.4rem;
    }

    header p {
      font-size: 0.95rem;
      color: var(--text-muted);
    }

    .card {
      background: var(--card-bg);
      border-radius: 0.75rem;
      padding: 1.25rem;
      box-shadow: 0 10px 25px rgba(15, 23, 42, 0.08);
      margin-bottom: 1rem;
    }

    h2 {
      font-size: 1.2rem;
      margin-bottom: 0.6rem;
    }

    h3 {
      font-size: 1rem;
      margin: 0.8rem 0 0.4rem;
    }

    p {
      font-size: 0.95rem;
      line-height: 1.5;
      margin-bottom: 0.4rem;
    }

    ul {
      margin-left: 1.1rem;
      margin-bottom: 0.4rem;
    }

    li {
      font-size: 0.93rem;
      margin-bottom: 0.2rem;
    }

    .tag {
      display: inline-block;
      font-size: 0.75rem;
      padding: 0.15rem 0.5rem;
      border-radius: 999px;
      background: #e5e7eb;
      color: #374151;
      margin-right: 0.25rem;
      margin-bottom: 0.25rem;
    }

    .download-card {
      text-align: center;
      padding: 1.5rem 1.25rem;
      border: 1px dashed #d1d5db;
    }

    .download-btn {
      display: inline-block;
      margin-top: 0.8rem;
      padding: 0.8rem 1.4rem;
      border-radius: 999px;
      background: var(--primary);
      color: #ffffff;
      text-decoration: none;
      font-weight: 600;
      font-size: 0.95rem;
      box-shadow: 0 8px 18px rgba(37, 99, 235, 0.35);
      transition: background 0.15s ease, transform 0.1s ease, box-shadow 0.1s ease;
    }

    .download-btn:active {
      transform: translateY(1px);
      box-shadow: 0 4px 10px rgba(37, 99, 235, 0.25);
    }

    .download-btn:hover {
      background: var(--primary-dark);
    }

    .note {
      font-size: 0.8rem;
      color: var(--text-muted);
      margin-top: 0.4rem;
    }

    .highlight {
      color: var(--accent);
      font-weight: 600;
    }

    .section-title {
      font-size: 0.9rem;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--text-muted);
      margin-bottom: 0.4rem;
    }
